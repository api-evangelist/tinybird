        idempotent: false
      call: tinybird-data-sources.createdatasource
      with:
        mode: tools.mode
        name: tools.name
        format: tools.format
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-data-source
      description: Get Data Source
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: tinybird-data-sources.getdatasource
      with:
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
    - name: update-data-source
      description: Update Data Source
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: tinybird-data-sources.updatedatasource
      with:
        name: tools.name
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-data-source
      description: Delete Data Source
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: tinybird-data-sources.deletedatasource
      with:
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
    - name: alter-data-source
      description: Alter Data Source
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: tinybird-data-sources.alterdatasource
      with:
        name: tools.name
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-data-source-rows
      description: Delete Data Source Rows
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: tinybird-data-sources.deletedatasourcerows
      with:
        name: tools.name
        body: tools.body
      outputParameters:
      - type: object
