naftiko: 1.0.0-alpha2
info:
  label: Tinybird API — Analyze
  description: 'Tinybird API — Analyze. 1 operations. Lead operation: Analyze File Schema. Self-contained Naftiko capability
    covering one Tinybird business surface.'
  tags:
  - Tinybird
  - Analyze
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TINYBIRD_API_KEY: TINYBIRD_API_KEY
capability:
  consumes:
  - type: http
    namespace: tinybird-analyze
    baseUri: https://api.tinybird.co
    description: Tinybird API — Analyze business capability. Self-contained, no shared references.
    resources:
    - name: v0-analyze
      path: /v0/analyze
      operations:
      - name: analyzefile
        method: POST
        description: Analyze File Schema
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.TINYBIRD_API_KEY}}'
  exposes:
  - type: rest
    namespace: tinybird-analyze-rest
    port: 8080
    description: REST adapter for Tinybird API — Analyze. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v0/analyze
      name: v0-analyze
      description: REST surface for v0-analyze.
      operations:
      - method: POST
        name: analyzefile
        description: Analyze File Schema
        call: tinybird-analyze.analyzefile
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: tinybird-analyze-mcp
    port: 9090
    transport: http
    description: MCP adapter for Tinybird API — Analyze. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: analyze-file-schema
      description: Analyze File Schema
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: tinybird-analyze.analyzefile
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
