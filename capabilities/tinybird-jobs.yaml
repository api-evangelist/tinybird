naftiko: 1.0.0-alpha2
info:
  label: Tinybird API — Jobs
  description: 'Tinybird API — Jobs. 2 operations. Lead operation: List Jobs. Self-contained Naftiko capability covering one
    Tinybird business surface.'
  tags:
  - Tinybird
  - Jobs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TINYBIRD_API_KEY: TINYBIRD_API_KEY
capability:
  consumes:
  - type: http
    namespace: tinybird-jobs
    baseUri: https://api.tinybird.co
    description: Tinybird API — Jobs business capability. Self-contained, no shared references.
    resources:
    - name: v0-jobs
      path: /v0/jobs/
      operations:
      - name: listjobs
        method: GET
        description: List Jobs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: status
          in: query
          type: string
          description: Filter jobs by status
        - name: kind
          in: query
          type: string
          description: Filter jobs by type
    - name: v0-jobs-jobId
      path: /v0/jobs/{jobId}
      operations:
      - name: getjob
        method: GET
        description: Get Job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: jobId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.TINYBIRD_API_KEY}}'
  exposes:
  - type: rest
    namespace: tinybird-jobs-rest
    port: 8080
    description: REST adapter for Tinybird API — Jobs. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/v0/jobs
      name: v0-jobs
      description: REST surface for v0-jobs.
      operations:
      - method: GET
        name: listjobs
        description: List Jobs
        call: tinybird-jobs.listjobs
        with:
          status: rest.status
          kind: rest.kind
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v0/jobs/{jobid}
      name: v0-jobs-jobid
      description: REST surface for v0-jobs-jobId.
      operations:
      - method: GET
        name: getjob
        description: Get Job
        call: tinybird-jobs.getjob
        with:
          jobId: rest.jobId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: tinybird-jobs-mcp
    port: 9090
    transport: http
    description: MCP adapter for Tinybird API — Jobs. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-jobs
      description: List Jobs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: tinybird-jobs.listjobs
      with:
        status: tools.status
        kind: tools.kind
      outputParameters:
      - type: object
        mapping: $.
    - name: get-job
      description: Get Job
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: tinybird-jobs.getjob
      with:
        jobId: tools.jobId
      outputParameters:
      - type: object
        mapping: $.
